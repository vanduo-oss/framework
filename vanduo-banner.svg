<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0.8"/>
    </linearGradient>
    
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#bae6fd" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="800" height="400" fill="url(#bgGrad)" rx="16" />

  <g opacity="0.4">
    <circle cx="150" cy="100" r="3" fill="#38bdf8">
      <animate attributeName="cy" values="100; 80; 100" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2; 1; 0.2" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="650" cy="80" r="4" fill="#0ea5e9">
      <animate attributeName="cy" values="80; 110; 80" dur="5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3; 1; 0.3" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="700" cy="250" r="2" fill="#bae6fd">
      <animate attributeName="cy" values="250; 220; 250" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="100" cy="300" r="5" fill="#0284c7">
      <animate attributeName="cy" values="300; 330; 300" dur="6s" repeatCount="indefinite" />
    </circle>
  </g>

  <g>
    <path d="M0,280 C150,320 250,220 400,260 C550,300 650,230 800,270 L800,400 L0,400 Z" fill="url(#waveGrad)" opacity="0.4">
      <animate attributeName="d" 
               values="M0,280 C150,320 250,220 400,260 C550,300 650,230 800,270 L800,400 L0,400 Z;
                       M0,260 C150,210 250,310 400,270 C550,230 650,320 800,280 L800,400 L0,400 Z;
                       M0,280 C150,320 250,220 400,260 C550,300 650,230 800,270 L800,400 L0,400 Z" 
               dur="8s" repeatCount="indefinite" />
    </path>
    <path d="M0,310 C200,250 300,350 500,300 C650,260 750,330 800,300 L800,400 L0,400 Z" fill="url(#waveGrad)" opacity="0.6">
      <animate attributeName="d" 
               values="M0,310 C200,250 300,350 500,300 C650,260 750,330 800,300 L800,400 L0,400 Z;
                       M0,290 C200,350 300,250 500,310 C650,340 750,270 800,290 L800,400 L0,400 Z;
                       M0,310 C200,250 300,350 500,300 C650,260 750,330 800,300 L800,400 L0,400 Z" 
               dur="6s" repeatCount="indefinite" />
    </path>
    <path d="M0,340 C150,380 350,300 450,340 C600,390 700,310 800,350 L800,400 L0,400 Z" fill="url(#waveGrad)">
      <animate attributeName="d" 
               values="M0,340 C150,380 350,300 450,340 C600,390 700,310 800,350 L800,400 L0,400 Z;
                       M0,350 C150,310 350,390 450,350 C600,310 700,390 800,360 L800,400 L0,400 Z;
                       M0,340 C150,380 350,300 450,340 C600,390 700,310 800,350 L800,400 L0,400 Z" 
               dur="4s" repeatCount="indefinite" />
    </path>
  </g>

  <g transform="translate(400, 140)" filter="url(#glow)">
    
    <path d="M-55,-25 L-80,0 L-55,25" fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
      <animateTransform attributeName="transform" type="translate" values="0,0; -8,0; 0,0" dur="3s" repeatCount="indefinite"/>
    </path>
    
    <path d="M55,-25 L80,0 L55,25" fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
      <animateTransform attributeName="transform" type="translate" values="0,0; 8,0; 0,0" dur="3s" repeatCount="indefinite"/>
    </path>
    
    <path d="M0,-35 C20,-10 30,10 30,25 C30,41.56 16.56,55 0,55 C-16.56,55 -30,41.56 -30,25 C-30,10 -20,-10 0,-35 Z" fill="#0ea5e9">
      <animateTransform attributeName="transform" type="translate" values="0,-5; 0,5; 0,-5" dur="4s" repeatCount="indefinite"/>
    </path>
    
    <path d="M-12,12 C-12,12 -18,25 -10,38 C-16,30 -16,16 -12,12 Z" fill="#ffffff" opacity="0.4">
       <animateTransform attributeName="transform" type="translate" values="0,-5; 0,5; 0,-5" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>

  <text x="400" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="url(#textGrad)" text-anchor="middle" letter-spacing="4">
    VANDUO
  </text>
  
  <text x="400" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#94a3b8" text-anchor="middle" letter-spacing="6">
    FRAMEWORK
  </text>
  
  <text x="400" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#e2e8f0" text-anchor="middle" letter-spacing="1" opacity="0.9">
    Essential just like water is
  </text>
</svg>
