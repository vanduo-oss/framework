# Playwright Test Suite for Vanduo Framework
# Single dependency strategy: @playwright/test only
name: Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
# --------------------

jobs:
  # Primary tests - run on all browsers for desktop and mobile
  playwright-tests:
    name: Playwright (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        project:
          - 'Chromium Desktop'
          - 'Firefox Desktop'
          - 'WebKit Desktop'
          - 'Chromium Mobile'
          - 'WebKit Mobile'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Enable Corepack
        run: corepack enable

      - name: Install Playwright
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps

      - name: Run tests
        run: pnpm exec playwright test --project="${{ matrix.project }}"

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.project }}
          path: test-results/
          retention-days: 7

  # Accessibility tests
  accessibility:
    name: Accessibility
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Enable Corepack
        run: corepack enable

      - name: Install Playwright
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium

      - name: Run accessibility tests
        run: pnpm exec playwright test --grep @a11y --project="Chromium Desktop"

      - name: Upload a11y report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: a11y-report
          path: playwright-report/
          retention-days: 7

  # Tablet tests (secondary priority - runs separately)
  tablet-tests:
    name: Tablet Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Enable Corepack
        run: corepack enable

      - name: Install Playwright
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps

      - name: Run tablet tests
        run: |
          pnpm exec playwright test --project="Chromium Tablet"
          pnpm exec playwright test --project="WebKit Tablet"

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: tablet-test-report
          path: playwright-report/
          retention-days: 7
